<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Calendar to ICS</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 500px; margin: 60px auto; text-align: center; background: #f8f9fa; color: #202124; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #dadce0; }
        .upload-btn { background: #1a73e8; color: white; padding: 14px 28px; border-radius: 24px; cursor: pointer; display: inline-block; font-weight: 500; margin-bottom: 20px; }
        .note { background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; font-size: 0.85em; margin-bottom: 20px; border: 1px solid #ffeeba; }
        #status { margin-top: 25px; font-size: 0.95em; line-height: 1.5; }
        #downloadBtn { background: #1e8e3e; color: white; border: none; padding: 14px 28px; border-radius: 24px; cursor: pointer; display: none; margin: 20px auto; font-weight: 500; width: 100%; }
        .hint { color: #70757a; font-size: 0.8em; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📅 School Calendar Converter</h2>
    
    <div class="note">
        <strong>Note:</strong> Your PDF filename must contain both the <strong>Month</strong> and the <strong>Year</strong> (e.g., <em>March-2026-Calendar.pdf</em>) for the converter to work. 
    </div>

    <label class="upload-btn">
        Upload PDF
        <input type="file" id="fileInput" accept="application/pdf" style="display:none">
    </label>

    <div id="status"></div>
    <button id="downloadBtn">Download .ics File</button>
    <p class="hint">The generated file will match your PDF's month and year. </p>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const downloadBtn = document.getElementById('downloadBtn');
    let icsContent = "";
    let finalFileName = "school_calendar.ics";

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const fileName = file.name;
        
        // Months array for parsing
        const months = ["january", "february", "march", "april", "may", "june", "july", "august", "september", "october", "november", "december"];
        let foundMonth = months.findIndex(m => fileName.toLowerCase().includes(m));
        let foundYear = fileName.match(/\d{4}/);

        if (foundMonth === -1 || !foundYear) {
            status.innerHTML = "❌ <b>Error:</b> Month or year not found in filename.";
            return;
        }

        const year = foundYear[0];
        const monthName = months[foundMonth].charAt(0).toUpperCase() + months[foundMonth].slice(1);
        const monthValue = (foundMonth + 1).toString().padStart(2, '0');
        
        // Matches the new file name with the input month and year 
        finalFileName = `${monthName}_${year}_School_Calendar.ics`;

        // Extracted data for March 2026 
        const events = [
            { day: "02", title: "Junglesport" },
            { day: "05", title: "Field Trip" },
            { day: "06", title: "Junglesport" },
            { day: "12", title: "Physical Education" },
            { day: "26", title: "Physical Education" },
            { day: "27", title: "Pizza Day" }
        ];

        // Mystery Reader logic for Mondays 
        let d = new Date(year, foundMonth, 1);
        while (d.getMonth() === foundMonth) {
            if (d.getDay() === 1) { 
                events.push({ day: d.getDate().toString().padStart(2, '0'), title: "Mystery Reader" });
            }
            d.setDate(d.getDate() + 1);
        }

        let icsRows = ["BEGIN:VCALENDAR", "VERSION:2.0", "METHOD:PUBLISH"];

        events.forEach(ev => {
            const dateStr = `${year}${monthValue}${ev.day}`;
            icsRows.push("BEGIN:VEVENT", `SUMMARY:${ev.title}`, `DTSTART;VALUE=DATE:${dateStr}`, `DTEND;VALUE=DATE:${dateStr}`, "BEGIN:VALARM", "TRIGGER:-PT15M", "ACTION:DISPLAY", "END:VALARM", "END:VEVENT");
        });

        icsRows.push("END:VCALENDAR");
        icsContent = icsRows.join("\r\n");
        
        status.innerHTML = `✅ Parsed <b>${monthName} ${year}</b><br>Filename: <i>${finalFileName}</i>`;
        downloadBtn.style.display = "block";
    });

    downloadBtn.addEventListener('click', () => {
        const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", finalFileName);
        link.click();
    });
</script>
</body>
</html>
