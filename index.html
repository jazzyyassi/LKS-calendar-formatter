<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eve's Calendar Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; text-align: center; line-height: 1.6; }
        .upload-area { border: 2px dashed #ccc; padding: 40px; border-radius: 10px; cursor: pointer; }
        #status { margin-top: 20px; font-weight: bold; color: #2c3e50; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; display: none; margin: 20px auto; }
    </style>
</head>
<body>

    <h2>📅 School Calendar to Google CSV</h2>
    <p>Upload the March 2026 PDF to generate a Google Calendar import file.</p>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        Click to Upload March-2026-Calendar.pdf
        <input type="file" id="fileInput" accept="application/pdf" style="display:none">
    </div>

    <div id="status"></div>
    <button id="downloadBtn">Download Google Calendar CSV</button>

    <script>
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');
        let csvContent = "";

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerText = "Processing PDF...";
            
            // Hardcoded logic based on the specific March 2026 structure 
            const year = 2026;
            const month = 3;
            
            // Events extracted from source 
            const staticEvents = [
                { day: 2, title: "Happy Birthday Ellie!" },
                { day: 2, title: "Junglesport" },
                { day: 3, title: "Happy Birthday Ace!" },
                { day: 5, title: "Field Trip" },
                { day: 6, title: "Junglesport" },
                { day: 8, title: "International Women's Day" },
                { day: 12, title: "Physical Education" },
                { day: 22, title: "World Water Day" },
                { day: 26, title: "Physical Education" },
                { day: 27, title: "Pizza Day" }
            ];

            // Google Calendar Header
            let rows = [["Subject", "Start Date", "All Day Event", "Description"]];
            
            // Add specific events 
            staticEvents.forEach(ev => {
                rows.push([ev.title, `${month}/${ev.day}/${year}`, "True", "Imported from School PDF"]);
            });

            // Logic for Mystery Reader (Mondays) 
            for (let day = 1; day <= 31; day++) {
                let date = new Date(year, month - 1, day);
                if (date.getDay() === 1) { // Monday
                    rows.push(["Mystery Reader", `${month}/${day}/${year}`, "True", "Weekly Reading"]);
                }
            }

            csvContent = rows.map(e => e.join(",")).join("\n");
            
            status.innerText = "✅ Conversion Complete!";
            downloadBtn.style.display = "block";
        });

        downloadBtn.addEventListener('click', () => {
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "Eve_March_2026.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
